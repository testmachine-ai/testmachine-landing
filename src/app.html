<!doctype html>
<html lang="en" data-theme="dark">

    <link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- Performance optimizations -->
    <link rel="preload" as="image" href="/assets/logo-icon-white.png" fetchpriority="high">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,300;1,8..60,400;1,8..60,500&display=swap" onload="this.onload=null;this.rel='stylesheet'">

    <!-- Deferred third-party scripts -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // HubSpot
        const hubspotScript = document.createElement('script');
        hubspotScript.src = 'https://js.hs-scripts.com/23470671.js';
        hubspotScript.async = true;
        hubspotScript.defer = true;
        document.body.appendChild(hubspotScript);
        
        // Google Analytics
        const gaScript = document.createElement('script');
        gaScript.src = 'https://www.googletagmanager.com/gtag/js?id=%sveltekit.env.PUBLIC_GA_ID%';
        gaScript.async = true;
        document.body.appendChild(gaScript);
        
        gaScript.onload = function() {
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', '%sveltekit.env.PUBLIC_GA_ID%');
        };
        
        // Gainsight PX
        (function(n,t,a,e,co){var i="aptrinsic";n[i]=n[i]||function(){
          (n[i].q=n[i].q||[]).push(arguments)},n[i].p=e;n[i].c=co;
          var r=t.createElement("script");r.async=!0,r.src=a+"?a="+e;
          document.body.appendChild(r);
        })(window,document,"https://web-sdk.aptrinsic.com/api/aptrinsic.js","%sveltekit.env.PUBLIC_GAINSIGHT_ID%");
      });
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
