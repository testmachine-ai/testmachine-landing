<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- Preload critical LCP asset -->
    <link rel="preload" as="image" href="/assets/logo-icon-white.webp" fetchpriority="high">

    <!-- Preload only Manrope — the LCP font used by the hero heading.
         JetBrains Mono is below the fold on first load; preloading all 4 weights
         (~88 KiB) competed with CSS downloads on mobile and hurt FCP. -->
    <link rel="preload" as="font" href="/fonts/manrope-variable-latin.woff2" type="font/woff2" crossorigin>

    <!-- Inline critical CSS: variables, reset, body, nav, hero, buttons.
         Allows FCP without waiting for external stylesheet round-trips. -->
    <style>
      @font-face{font-family:'Manrope Variable';font-style:normal;font-display:swap;font-weight:200 800;src:url('/fonts/manrope-variable-latin.woff2') format('woff2-variations')}
      @font-face{font-family:'Manrope Fallback';src:local('Arial'),local('Helvetica Neue'),local('Helvetica');size-adjust:103%;ascent-override:96%;descent-override:24%;line-gap-override:5%}
      :root,[data-theme="dark"]{--bg:oklch(0.18 0.005 260);--bg-raised:oklch(0.21 0.005 260);--fg:oklch(0.92 0 0);--fg-muted:oklch(0.65 0 0);--fg-dim:oklch(0.45 0 0);--border:oklch(0.32 0.005 260);--border-subtle:oklch(0.25 0.005 260);--accent:oklch(0.72 0.12 192);--accent-hover:oklch(0.80 0.12 192);--nav-bg:oklch(0.18 0.005 260 / 0.85);--font-display:'Manrope Variable','Manrope','Manrope Fallback',sans-serif;--font-mono:'JetBrains Mono','IBM Plex Mono',monospace;--font:var(--font-mono);--font-body:'Manrope Variable','Manrope','Manrope Fallback',sans-serif;--nav-h:72px;--max-w:1120px;--section-py:clamp(80px,10vw,140px);--gap:24px;--transition:0.25s ease}
      [data-theme="light"]{--bg:oklch(0.97 0.003 260);--fg:oklch(0.15 0 0);--fg-muted:oklch(0.45 0 0);--fg-dim:oklch(0.6 0 0);--border:oklch(0.82 0 0);--border-subtle:oklch(0.88 0 0);--accent:oklch(0.50 0.15 192);--accent-hover:oklch(0.42 0.15 192);--nav-bg:oklch(0.97 0.003 260 / 0.85)}
      *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
      html{scroll-behavior:smooth;scroll-padding-top:var(--nav-h);-webkit-text-size-adjust:100%}
      body{font-family:var(--font);font-size:17px;line-height:1.7;color:var(--fg);background:var(--bg);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden}
      img{max-width:100%;height:auto;display:block}a{color:inherit;text-decoration:none}button{border:none;background:none;cursor:pointer;font-family:inherit;color:inherit}ul{list-style:none}
      .container{width:100%;max-width:var(--max-w);margin:0 auto;padding:0 clamp(20px,4vw,40px)}
    </style>

    <!-- Google Analytics: async + small, loads immediately for pageview attribution -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%sveltekit.env.PUBLIC_GA_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      window.gtag = function(){window.dataLayer.push(arguments);};
      window.gtag('js', new Date());
      window.gtag('config', '%sveltekit.env.PUBLIC_GA_ID%');
    </script>

    <!-- Gainsight PX: deferred until after page load to free bandwidth
         for critical CSS, fonts, and LCP on mobile. -->
    <script>
      window.addEventListener('load', function() {
        (function(n,t,a,e,co){var i="aptrinsic";n[i]=n[i]||function(){
          (n[i].q=n[i].q||[]).push(arguments)},n[i].p=e;n[i].c=co;
          var r=t.createElement("script");r.async=!0;r.src=a+"?a="+e;
          var c=t.getElementsByTagName("script")[0];c.parentNode.insertBefore(r,c)
        })(window,document,"https://web-sdk.aptrinsic.com/api/aptrinsic.js","%sveltekit.env.PUBLIC_GAINSIGHT_ID%");
      });
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
