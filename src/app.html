<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- Preload critical LCP asset -->
    <link rel="preload" as="image" href="/assets/logo-icon-white.webp" fetchpriority="high">

    <!-- Font preloads — start downloading before CSS is parsed, breaking the
         HTML → CSS → @font-face discovery chain that was delaying LCP by ~400ms.
         All files are at stable /fonts/ URLs so the preload href matches @font-face src. -->
    <link rel="preload" as="font" href="/fonts/manrope-variable-latin.woff2" type="font/woff2" crossorigin>
    <link rel="preload" as="font" href="/fonts/jetbrains-mono-latin-400.woff2" type="font/woff2" crossorigin>
    <link rel="preload" as="font" href="/fonts/jetbrains-mono-latin-500.woff2" type="font/woff2" crossorigin>
    <link rel="preload" as="font" href="/fonts/jetbrains-mono-latin-600.woff2" type="font/woff2" crossorigin>
    <link rel="preload" as="font" href="/fonts/jetbrains-mono-latin-700.woff2" type="font/woff2" crossorigin>

    <!-- HubSpot -->
    <script async defer src="https://js.hs-scripts.com/23470671.js"></script>

    <!-- Google Analytics: external script is async; config uses type=module (deferred,
         non-blocking). window.gtag assigned explicitly so it is globally accessible. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%sveltekit.env.PUBLIC_GA_ID%"></script>
    <script type="module">
      window.dataLayer = window.dataLayer || [];
      window.gtag = function(){window.dataLayer.push(arguments);};
      window.gtag('js', new Date());
      window.gtag('config', '%sveltekit.env.PUBLIC_GA_ID%');
    </script>

    <!-- Gainsight PX: type=module defers execution, does not block rendering -->
    <script type="module">
      (function(n,t,a,e,co){var i="aptrinsic";n[i]=n[i]||function(){
        (n[i].q=n[i].q||[]).push(arguments)},n[i].p=e;n[i].c=co;
        var r=t.createElement("script");r.async=!0,r.src=a+"?a="+e;
        var c=t.getElementsByTagName("script")[0];c.parentNode.insertBefore(r,c)
      })(window,document,"https://web-sdk.aptrinsic.com/api/aptrinsic.js","%sveltekit.env.PUBLIC_GAINSIGHT_ID%");
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
