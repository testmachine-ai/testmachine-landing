name: Deploy

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-2

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    # Skip until staging infrastructure has been provisioned via Terraform
    if: ${{ vars.LANDING_STAGING_BUCKET != '' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_GA_ID: G-1656FRRR8K
          PUBLIC_GAINSIGHT_ID: AP-YYLJ60QOHXIJ-2-2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync immutable assets (long cache)
        run: |
          aws s3 sync build/_app/immutable/ \
            s3://${{ vars.LANDING_STAGING_BUCKET }}/_app/immutable/ \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync static fonts (long cache — stable filenames, content never changes)
        run: |
          aws s3 sync build/fonts/ \
            s3://${{ vars.LANDING_STAGING_BUCKET }}/fonts/ \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync remaining files (no-cache for HTML, short cache for assets)
        run: |
          aws s3 sync build/ s3://${{ vars.LANDING_STAGING_BUCKET }} \
            --delete \
            --exclude "_app/immutable/*" \
            --exclude "fonts/*" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.LANDING_STAGING_CLOUDFRONT_ID }} \
            --paths "/*"

      - name: Summary
        run: |
          echo "## Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Bucket:** ${{ vars.LANDING_STAGING_BUCKET }}" >> $GITHUB_STEP_SUMMARY
          echo "**Distribution:** ${{ vars.LANDING_STAGING_CLOUDFRONT_ID }}" >> $GITHUB_STEP_SUMMARY
