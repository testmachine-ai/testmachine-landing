name: Deploy

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-2

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    # Skip until staging infrastructure has been provisioned via Terraform
    if: ${{ vars.LANDING_STAGING_BUCKET != '' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_GA_ID: G-1656FRRR8K
          PUBLIC_GAINSIGHT_ID: AP-YYLJ60QOHXIJ-2-2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync build/ s3://${{ vars.LANDING_STAGING_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.LANDING_STAGING_CLOUDFRONT_ID }} \
            --paths "/*"

      - name: Summary
        run: |
          echo "## Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Bucket:** ${{ vars.LANDING_STAGING_BUCKET }}" >> $GITHUB_STEP_SUMMARY
          echo "**Distribution:** ${{ vars.LANDING_STAGING_CLOUDFRONT_ID }}" >> $GITHUB_STEP_SUMMARY
