  <rect x="40" y="220" width="520" height="60" rx="6" fill="oklch(0.16 0.005 260)" stroke="oklch(0.25 0.005 260)" stroke-width="1"/>
  
  <text x="55" y="240" fill="oklch(0.92 0 0)" font-family="JetBrains Mono, monospace" font-size="11">
    "Hi Vitalik, saw your recent thoughts on MEV extraction. At TestMachine,
