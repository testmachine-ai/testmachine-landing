  </text>
  
  <!-- Action Buttons -->
  <rect x="40" y="300" width="100" height="32" rx="6" fill="oklch(0.72 0.12 192)" cursor="pointer"/>
  <text x="90" y="320" text-anchor="middle" fill="oklch(0.18 0.005 260)" font-family="Manrope, sans-serif" font-size="12" font-weight="600">
