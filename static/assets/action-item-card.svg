<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(0.21 0.005 260);stop-opacity:1" />
      <stop offset="100%" style="stop-color:oklch(0.18 0.005 260);stop-opacity:1" />
    </linearGradient>
    
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="oklch(0.1 0 0)" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Card Background -->
  <rect x="20" y="20" width="560" height="360" rx="12" fill="url(#cardBg)" filter="url(#cardShadow)" stroke="oklch(0.32 0.005 260)" stroke-width="1"/>
  
  <!-- Priority Badge -->
  <rect x="40" y="40" width="80" height="24" rx="12" fill="#ef4444" opacity="0.9"/>
  <text x="80" y="56" text-anchor="middle" fill="white" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600">HIGH P1</text>
  
  <!-- Main Action -->
