  <rect x="280" y="300" width="100" height="32" rx="6" fill="oklch(0.25 0.005 260)" stroke="oklch(0.45 0 0)" stroke-width="1" cursor="pointer"/>
  <text x="330" y="320" text-anchor="middle" fill="oklch(0.92 0 0)" font-family="Manrope, sans-serif" font-size="12" font-weight="600">
