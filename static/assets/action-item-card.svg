  </text>
  
  <!-- Intelligence Indicators -->
  <circle cx="520" cy="50" r="6" fill="#22c55e"/>
  <text x="530" y="55" fill="#22c55e" font-family="JetBrains Mono, monospace" font-size="10">Active</text>
  
  <circle cx="520" cy="70" r="6" fill="oklch(0.72 0.12 192)"/>
